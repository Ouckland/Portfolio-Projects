{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="{% static 'css/note.css' %}">
</head>
<body>
    {% include "partials/header.html" %}
    <div class='message-card'>
        {% if messages %}
            {% for message in messages %}
                <span class="message-{{ message.tags}}">{{ message }}</span>
            {% endfor %}
        {% endif %}
    </div>
    <section>
        <div class='note-card'>
           <div class='note-detail'>
                <span>Title - {{note.title}}</span><hr>
                <span>Description - {{note.content}}</span><hr>
                <span>Category - {{note.get_category_display}}</span><hr>
                <span>Creation Date - {{note.date_created}}</span><hr>
                <div class='note-buttons'>
                    <a href="{% url 'notes:edit_note' note.id %}">Edit</a>
                    <a href="{% url 'notes:delete_note' note.id %}">Delete</a>
                </div>
            </div>
        </div>
    </section>
</body>
</html>
